<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; style-src 'unsafe-inline'; script-src 'unsafe-inline'">
  <title>Set API Key</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      padding: 20px;
      user-select: none;
    }
    h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: #fff; }
    p  { font-size: 12px; line-height: 1.5; margin-bottom: 14px; color: #aaa; }
    input {
      width: 100%;
      padding: 8px 10px;
      background: #2d2d2d;
      color: #d4d4d4;
      border: 1px solid #555;
      border-radius: 4px;
      font-size: 13px;
      font-family: 'Consolas', 'Courier New', monospace;
      outline: none;
      margin-bottom: 16px;
    }
    input:focus { border-color: #007acc; }
    .btns {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
    }
    button {
      padding: 6px 18px;
      border: none;
      border-radius: 4px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
    }
    .ok     { background: #007acc; color: #fff; }
    .ok:hover { background: #0062a3; }
    .cancel { background: #3c3c3c; color: #d4d4d4; }
    .cancel:hover { background: #4a4a4a; }
  </style>
</head>
<body>
  <h3>Set API Key</h3>
  <p>
    Enter your API key for the provider you want to use:<br>
    Anthropic: <code>sk-ant-api03-…</code> &nbsp;|&nbsp;
    OpenAI: <code>sk-…</code> &nbsp;|&nbsp;
    NVIDIA: <code>nvapi-…</code> &nbsp;|&nbsp;
    Google: your Gemini key
  </p>
  <input type="password" id="key-input"
         placeholder="sk-ant-api03-… or sk-… or nvapi-…"
         autocomplete="off" spellcheck="false">
  <div class="btns">
    <button class="cancel" id="cancel-btn">Cancel</button>
    <button class="ok"     id="ok-btn">Save Key</button>
  </div>
  <script>
    const input = document.getElementById('key-input');
    input.focus();

    document.getElementById('ok-btn').addEventListener('click', function () {
      const v = input.value.trim();
      if (v.length > 10) {
        window.dialogBridge.submit(v);
      }
    });

    document.getElementById('cancel-btn').addEventListener('click', function () {
      window.dialogBridge.cancel();
    });

    input.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') {
        const v = input.value.trim();
        if (v.length > 10) window.dialogBridge.submit(v);
      }
      if (e.key === 'Escape') {
        window.dialogBridge.cancel();
      }
    });
  </script>
</body>
</html>
